// Simple browser-based water balloon battle game for kids or anyone who wants to play
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Water Balloon Battle</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            min-height: 100vh;
            background: #111;
            font-family: 'Comic Sans MS', sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            max-width: 100vw;
            max-height: 100vh;
            box-shadow: 0 0 30px rgba(100, 200, 255, 0.4);
            border-radius: 0px;
            touch-action: none;
        }

        /* Tablet styles */
        @media (min-width: 600px) {
            #game-container {
                width: 90vw;
                height: 90vh;
            }
            canvas {
                width: 90vw;
                height: 90vh;
                max-width: 900px;
                max-height: 700px;
            }
        }

        /* Desktop styles */
        @media (min-width: 1024px) {
            #game-container {
                width: 800px;
                height: 600px;
            }
            canvas {
                width: 800px;
                height: 600px;
                max-width: 100vw;
                max-height: 100vh;
            }
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
<script>
    // Set up the audio context for playing sounds
    let audioCtx = null;
    const audioCache = {};
    const gameSettings = {
        musicVolume: 0.5, // Default music volume
        sfxVolume: 1.0,  // Default sound effects volume
        musicEnabled: true, // Toggle for background music
        sfxEnabled: true   // Toggle for sound effects
    };
    
    // Create the audio context if it doesn't exist yet
    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        return audioCtx;
    }
    
    // Load an audio file and store it in the cache
    async function loadAudioFile(name, path) {
        try {
            const response = await fetch(path);
            const arrayBuffer = await response.arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            audioCache[name] = audioBuffer;
            return audioBuffer;
        } catch (e) {
            console.error(`Couldn't load audio file: ${path}`, e);
            return null;
        }
    }
    
    // Play audio with volume control
    function playAudio(name, volume = 1.0) {
        if (audioCache[name] && audioCtx && gameSettings.sfxEnabled) {
            const source = audioCtx.createBufferSource();
            source.buffer = audioCache[name];
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = volume * gameSettings.sfxVolume;
            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            source.start(0);
            return source;
        }
    }
    
    // Sound effect library with audio file support
    const sfx = {
        swoosh: (volume = 1.0) => playAudio('swoosh', volume),
        splash: (volume = 1.0) => playAudio('splash', volume),
        giggle: (volume = 1.0) => playAudio('giggle', volume),
        cheer: (volume = 1.0) => playAudio('cheer', volume),
        playMusic: (volume = 0.5) => {
            if (audioCache['music'] && audioCtx && gameSettings.musicEnabled) {
                const source = audioCtx.createBufferSource();
                source.buffer = audioCache['music'];
                source.loop = true;
                const gainNode = audioCtx.createGain();
                gainNode.gain.value = volume * gameSettings.musicVolume;
                source.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                source.start(0);
                audioCtx.musicSource = source;
                audioCtx.musicGain = gainNode;
                return source;
            }
        },
        stopMusic: () => {
            if (audioCtx && audioCtx.musicSource) {
                try {
                    audioCtx.musicSource.stop();
                } catch (e) {}
                audioCtx.musicSource = null;
            }
        },
        setMusicVolume: (volume) => {
            gameSettings.musicVolume = Math.max(0, Math.min(1, volume));
            if (audioCtx && audioCtx.musicGain) {
                audioCtx.musicGain.gain.value = gameSettings.musicVolume;
            }
        },
        setSFXVolume: (volume) => {
            gameSettings.sfxVolume = Math.max(0, Math.min(1, volume));
        }
    };


    // Game Save Data Manager
    class DataManager {
        constructor() { this.data = this.load(); }
        save() { try { localStorage.setItem('magicalWaterBalloonBattleData', JSON.stringify(this.data)); } catch (e) {} }
        load() {
            try { const d = localStorage.getItem('magicalWaterBalloonBattleData'); if (d) return JSON.parse(d); } catch (e) {}
            return { sparkleStars: 0, musicVolume: 0.5, sfxVolume: 1.0 };
        }
        addStars(amount) { this.data.sparkleStars += amount; this.save(); }
        getStars() { return this.data.sparkleStars; }
        saveSettings() { this.data.musicVolume = gameSettings.musicVolume; this.data.sfxVolume = gameSettings.sfxVolume; this.save(); }
        loadSettings() { if (this.data.musicVolume !== undefined) gameSettings.musicVolume = this.data.musicVolume; if (this.data.sfxVolume !== undefined) gameSettings.sfxVolume = this.data.sfxVolume; }
    }
    const dataManager = new DataManager();

    class Preloader extends Phaser.Scene {
        constructor() { super('Preloader'); }
        async preload() {
            await initAudio();
            // Load audio files
            const audioFiles = ['swoosh.wav', 'splash.wav', 'giggle.wav', 'cheer.wav', 'music.wav'];
            const names = ['swoosh', 'splash', 'giggle', 'cheer', 'music'];
            for (let i = 0; i < audioFiles.length; i++) {
                await loadAudioFile(names[i], `assets/sounds/${audioFiles[i]}`);
            }
            
            this.add.text(this.cameras.main.width/2, this.cameras.main.height/2, 'Loading Game...', { font: '48px Comic Sans MS', fill: '#fff' }).setOrigin(0.5);
            this.time.delayedCall(800, () => this.scene.start('MainMenu'));
        }
    }

    class MainMenu extends Phaser.Scene {
        constructor() { super('MainMenu'); }
        create() {
            dataManager.loadSettings();
            const W = this.scale.width;
            const H = this.scale.height;
            this.add.rectangle(0, 0, W, H, 0x1a003c).setOrigin(0);
            
            // Draw a vibrant background grid pattern
            const g = this.add.graphics();
            g.lineStyle(2, 0x4a008c, 0.5);
            for(let i=0; i<W; i+=40) { g.moveTo(i,0); g.lineTo(i,H); }
            for(let i=0; i<H; i+=40) { g.moveTo(0,i); g.lineTo(W,i); }
            g.strokePath();

            // Animated Title
            const title = this.add.text(W/2, H * 0.25, 'Water Balloon\nBattle!', { 
                font: '64px Comic Sans MS', fill: '#00ffff', align: 'center', stroke: '#000088', strokeThickness: 8 
            }).setOrigin(0.5);
            this.tweens.add({
                targets: title, y: (H * 0.25) - 10, angle: 2, duration: 2000, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
            });
            this.tweens.add({
                targets: title, angle: -2, duration: 1800, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
            });

            // Play Button
            const playBtn = this.add.text(W/2, H * 0.55, ' PLAY NOW ', { 
                font: '48px Comic Sans MS', fill: '#fff', backgroundColor: '#ff00aa', padding: {x:20,y:10}, stroke: '#fff', strokeThickness: 4 
            }).setOrigin(0.5).setInteractive({ useHandCursor: true });
            
            playBtn.on('pointerdown', () => { sfx.splash(); this.scene.start('Game'); });
            playBtn.on('pointerover', () => this.tweens.add({targets: playBtn, scale: 1.1, duration: 100}));
            playBtn.on('pointerout', () => this.tweens.add({targets: playBtn, scale: 1, duration: 100}));

            // Options Button
            const optBtn = this.add.text(W/2, H * 0.72, ' OPTIONS ', { 
                font: '40px Comic Sans MS', fill: '#fff', backgroundColor: '#0099ff', padding: {x:20,y:10}, stroke: '#fff', strokeThickness: 4 
            }).setOrigin(0.5).setInteractive({ useHandCursor: true });
            
            optBtn.on('pointerdown', () => { sfx.splash(); this.scene.start('Options'); });
            optBtn.on('pointerover', () => this.tweens.add({targets: optBtn, scale: 1.1, duration: 100}));
            optBtn.on('pointerout', () => this.tweens.add({targets: optBtn, scale: 1, duration: 100}));

            // High Score
            this.add.text(W-20, 20, `Stars: ✨${dataManager.getStars()}`, { 
                font: '32px Comic Sans MS', fill: '#FFD700', stroke: '#000', strokeThickness: 4
            }).setOrigin(1, 0);

            // Start background music fresh on every menu visit
            sfx.stopMusic();
            sfx.playMusic(gameSettings.musicVolume);
        }
    }

    class Options extends Phaser.Scene {
        constructor() { super('Options'); }
        create() {
            this.draggingMusic = false;
            this.draggingSFX = false;
            this.add.rectangle(0, 0, this.cameras.main.width, this.cameras.main.height, 0x1a003c).setOrigin(0);
            
            // Title
            this.add.text(this.cameras.main.width/2, 60, 'OPTIONS', { 
                font: '56px Comic Sans MS', fill: '#00ffff', stroke: '#000088', strokeThickness: 8 
            }).setOrigin(0.5);

            let yPos = 150;

            // Music Volume Label
            this.add.text(100, yPos, 'Music Volume:', { font: '32px Comic Sans MS', fill: '#fff', stroke: '#000', strokeThickness: 4 });
            
            // Music Volume Slider
            const musicSlider = this.add.graphics();
            const sliderX = 350, sliderY = yPos + 10, sliderWidth = 200, sliderHeight = 20;
            this.drawSlider(musicSlider, sliderX, sliderY, sliderWidth, sliderHeight, gameSettings.musicVolume);
            
            const musicHandle = this.add.circle(sliderX + sliderWidth * gameSettings.musicVolume, sliderY + sliderHeight/2, 12, 0xff0000).setInteractive().setDepth(10);
            musicHandle.on('pointerdown', () => { this.draggingMusic = true; });
            
            this.handleMusicUp = () => { this.draggingMusic = false; };
            this.handleMusicMove = (p) => {
                if (this.draggingMusic) {
                    let newX = Math.max(sliderX, Math.min(sliderX + sliderWidth, p.x));
                    let newVol = (newX - sliderX) / sliderWidth;
                    gameSettings.musicVolume = newVol;
                    musicHandle.x = newX;
                    musicSlider.clear();
                    this.drawSlider(musicSlider, sliderX, sliderY, sliderWidth, sliderHeight, newVol);
                    sfx.setMusicVolume(newVol);
                }
            };
            this.input.on('pointerup', this.handleMusicUp, this);
            this.input.on('pointermove', this.handleMusicMove, this);

            yPos += 80;

            // SFX Volume Label
            this.add.text(100, yPos, 'Sound Effects:', { font: '32px Comic Sans MS', fill: '#fff', stroke: '#000', strokeThickness: 4 });
            
            // SFX Volume Slider
            const sfxSlider = this.add.graphics();
            const sfxHandle = this.add.circle(sliderX + sliderWidth * gameSettings.sfxVolume, sliderY + sliderHeight/2 + 80, 12, 0x00ff00).setInteractive().setDepth(10);
            sfxHandle.on('pointerdown', () => { this.draggingSFX = true; });
            
            this.handleSFXUp = () => { this.draggingSFX = false; };
            this.handleSFXMove = (p) => {
                if (this.draggingSFX) {
                    let newX = Math.max(sliderX, Math.min(sliderX + sliderWidth, p.x));
                    let newVol = (newX - sliderX) / sliderWidth;
                    gameSettings.sfxVolume = newVol;
                    sfxHandle.x = newX;
                    sfxSlider.clear();
                    this.drawSlider(sfxSlider, sliderX, sliderY + 80, sliderWidth, sliderHeight, newVol);
                }
            };
            this.input.on('pointerup', this.handleSFXUp, this);
            this.input.on('pointermove', this.handleSFXMove, this);
            
            this.drawSlider(sfxSlider, sliderX, sliderY + 80, sliderWidth, sliderHeight, gameSettings.sfxVolume);

            yPos += 100;

            // Back Button
            const backBtn = this.add.text(this.cameras.main.width/2, 500, ' BACK ', { 
                font: '40px Comic Sans MS', fill: '#fff', backgroundColor: '#aa00ff', padding: {x:20,y:10}, stroke: '#fff', strokeThickness: 4 
            }).setOrigin(0.5).setInteractive({ useHandCursor: true });
            
            backBtn.on('pointerdown', () => {
                dataManager.saveSettings();
                sfx.splash();
                this.scene.start('MainMenu');
            });
            backBtn.on('pointerover', () => this.tweens.add({targets: backBtn, scale: 1.1, duration: 100}));
            backBtn.on('pointerout', () => this.tweens.add({targets: backBtn, scale: 1, duration: 100}));
        }

        drawSlider(graphics, x, y, width, height, value) {
            graphics.clear();
            graphics.fillStyle(0x555555);
            graphics.fillRect(x, y, width, height);
            graphics.fillStyle(0x00ff00);
            graphics.fillRect(x, y, width * value, height);
        }

        shutdown() {
            this.input.off('pointerup', this.handleMusicUp, this);
            this.input.off('pointermove', this.handleMusicMove, this);
            this.input.off('pointerup', this.handleSFXUp, this);
            this.input.off('pointermove', this.handleSFXMove, this);
        }
    }

    class Game extends Phaser.Scene {
        constructor() { super('Game'); }
        init(data) {
            this.currentLevel = (data && data.level) ? data.level : 1;
            this.createGraphics();
        }
        
        // Generates procedural graphics for entities including child-themed sprites
        createGraphics() {
            // Player Avatar - Child with happy face
            let pg = this.make.graphics({x:0,y:0,add:false});
            pg.fillStyle(0x000000,0.2); pg.fillEllipse(30,58,42,16); // Shadow
            pg.fillStyle(0xffcc99); pg.fillCircle(30,25,18); // Head
            pg.fillStyle(0x4488ff); pg.fillRoundedRect(8,40,44,25,8); // Body (shirt)
            pg.fillStyle(0xffcc99); pg.fillRoundedRect(6,30,9,15); pg.fillRoundedRect(49,30,9,15); // Arms
            pg.fillStyle(0xffcc99); pg.fillRoundedRect(12,65,8,10); pg.fillRoundedRect(34,65,8,10); // Legs
            pg.fillStyle(0xffffff); pg.fillCircle(24,22,4); pg.fillCircle(36,22,4); // Eyes
            pg.fillStyle(0x0066ff); pg.fillCircle(24,22,2); pg.fillCircle(36,22,2); // Pupils
            pg.fillStyle(0xff6699); pg.fillEllipse(30,28,8,5); // Mouth
            pg.fillStyle(0xff0000); pg.fillRect(8,38,28,4); // Shirt stripe
            pg.generateTexture('player', 60, 75);

            // Opponent Avatar - Child with different colors
            let og = this.make.graphics({x:0,y:0,add:false});
            og.fillStyle(0x000000,0.2); og.fillEllipse(30,58,42,16); // Shadow
            og.fillStyle(0xffcc99); og.fillCircle(30,25,18); // Head
            og.fillStyle(0xff8844); og.fillRoundedRect(8,40,44,25,8); // Body (shirt orange)
            og.fillStyle(0xffcc99); og.fillRoundedRect(6,30,9,15); og.fillRoundedRect(49,30,9,15); // Arms
            og.fillStyle(0xffcc99); og.fillRoundedRect(12,65,8,10); og.fillRoundedRect(34,65,8,10); // Legs
            og.fillStyle(0xffffff); og.fillCircle(24,22,4); og.fillCircle(36,22,4); // Eyes
            og.fillStyle(0x000000); og.fillCircle(24,22,2); og.fillCircle(36,22,2); // Pupils
            og.fillStyle(0xff6699); og.fillEllipse(30,28,8,5); // Mouth
            og.fillStyle(0xffaa44); og.fillRect(12,38,24,4); // Shirt stripe
            og.generateTexture('opponent', 60, 75);

            // Water Balloon Sprite
            let bg = this.make.graphics({x:0,y:0,add:false});
            bg.fillStyle(0x00aaff); bg.fillEllipse(20,25,16,22); // Balloon body
            bg.fillStyle(0x0088cc); bg.fillTriangle(20,4, 14,10, 26,10); // Balloon knot
            bg.fillStyle(0xffffff, 0.6); bg.fillEllipse(16,20,6,12); // Reflection/Shine
            bg.generateTexture('balloon', 40, 50);

            // Splash Particle
            let sp = this.make.graphics({x:0,y:0,add:false});
            sp.fillStyle(0x00aaff); sp.fillCircle(8,8,8);
            sp.generateTexture('splash_part', 16, 16);

            // Final Boss Sprite - bigger, dark purple, crowned
            let boss = this.make.graphics({x:0,y:0,add:false});
            boss.fillStyle(0x000000,0.25); boss.fillEllipse(50,102,72,20); // Shadow
            boss.fillStyle(0xdd99ff); boss.fillCircle(50,40,30); // Head
            boss.fillStyle(0x550088); boss.fillRoundedRect(14,68,72,40,10); // Body
            boss.fillStyle(0xdd99ff); boss.fillRoundedRect(4,54,16,26); boss.fillRoundedRect(80,54,16,26); // Arms
            boss.fillStyle(0xdd99ff); boss.fillRoundedRect(20,108,15,18); boss.fillRoundedRect(65,108,15,18); // Legs
            boss.fillStyle(0xff2222); boss.fillCircle(40,36,8); boss.fillCircle(60,36,8); // Eyes (red!)
            boss.fillStyle(0xffffff); boss.fillCircle(43,36,3); boss.fillCircle(63,36,3); // Eye glint
            boss.fillStyle(0x330022); boss.fillEllipse(50,52,16,8); // Mean mouth
            boss.fillStyle(0xff00ff); boss.fillRect(14,68,44,6); // Shirt stripe
            // Gold crown
            boss.fillStyle(0xffdd00);
            boss.fillRect(28,12,44,12);
            boss.fillTriangle(28,12,33,0,38,12);
            boss.fillTriangle(47,12,50,2,53,12);
            boss.fillTriangle(62,12,67,0,72,12);
            boss.fillStyle(0xff0000); boss.fillCircle(50,12,4); // Crown gem
            boss.generateTexture('boss', 100, 128);
        }

        create() {
            // Music already playing from MainMenu - no need to restart
            
            // Enable multi-touch for joystick + throwing simultaneously
            this.input.addPointer(2); 
            this.score = 0;
            this.isPaused = false;
            this.playerSoakedCount = 0;
            this.npcSoakedCount = 0;
            this.gameEnded = false;
            this.levelConfig = this.getLevelConfig(this.currentLevel);
            
            // Render Dynamic Arena Background with hiding places
            const bgGraphics = this.add.graphics();
            bgGraphics.fillStyle(0x87ceeb); // Sky blue
            bgGraphics.fillRect(0, 0, this.cameras.main.width, this.cameras.main.height);

            // Add clouds
            for (let i = 0; i < 5; i++) {
                bgGraphics.fillStyle(0xffffff, 0.8);
                bgGraphics.fillEllipse(
                    Phaser.Math.Between(50, 750),
                    Phaser.Math.Between(50, 200),
                    Phaser.Math.Between(80, 120),
                    Phaser.Math.Between(40, 60)
                );
            }

            // Add grass
            bgGraphics.fillStyle(0x228b22); // Forest green
            bgGraphics.fillRect(0, this.cameras.main.height - 100, this.cameras.main.width, 100);

            // Add flowers
            for (let i = 0; i < 20; i++) {
                bgGraphics.fillStyle(Phaser.Display.Color.RandomRGB().color);
                bgGraphics.fillCircle(
                    Phaser.Math.Between(0, this.cameras.main.width),
                    Phaser.Math.Between(this.cameras.main.height - 100, this.cameras.main.height - 20),
                    Phaser.Math.Between(3, 6)
                );
            }

            // Add trees
            for (let i = 0; i < 3; i++) {
                bgGraphics.fillStyle(0x8b4513); // Brown trunk
                bgGraphics.fillRect(100 + i * 200, this.cameras.main.height - 150, 20, 50);
                bgGraphics.fillStyle(0x006400); // Dark green foliage
                bgGraphics.fillCircle(110 + i * 200, this.cameras.main.height - 150, 40);
            }

            // Add hiding places - trees
            bgGraphics.fillStyle(0x654321);
            for(let i=0; i<3; i++) {
                bgGraphics.fillEllipse(150+i*250, 150, 60, 80); // Tree trunks
            }
            bgGraphics.fillStyle(0x228800);
            for(let i=0; i<3; i++) {
                bgGraphics.fillCircle(150+i*250, 100, 70); // Tree foliage
            }
            
            // Rocks for hiding
            bgGraphics.fillStyle(0x888888);
            for(let i=0; i<4; i++) {
                bgGraphics.fillEllipse(200+i*150, 550, 50, 35);
            }
            
            // Small building/shed
            bgGraphics.fillStyle(0xaa6644);
            bgGraphics.fillRect(680, 380, 100, 80);
            bgGraphics.fillStyle(0xff8844);
            bgGraphics.fillTriangle(680, 380, 730, 340, 780, 380);
            bgGraphics.fillStyle(0x5555cc);
            bgGraphics.fillRect(705, 410, 20, 20);
            
            // Central Pool
            bgGraphics.fillStyle(0x2288dd);
            bgGraphics.fillEllipse(400, 300, 200, 150);
            bgGraphics.lineStyle(8, 0xcccccc);
            bgGraphics.strokeEllipse(400, 300, 200, 150);

            // Instantiate Player
            this.player = this.physics.add.sprite(400, 500, 'player').setCollideWorldBounds(true).setDepth(10);
            this.player.body.setSize(40, 40).setOffset(10, 22); // Better physical hitbox

            // Object Pooling for Balloons (must be created BEFORE collision setup)
            this.balloons = this.physics.add.group({ maxSize: 40 });

            // Object groups
            this.opponents = this.physics.add.group();

            // Spawn entities for this level
            this.spawnLevel();

            // Setup Collisions
            this.physics.add.collider(this.player, this.opponents);
            this.physics.add.collider(this.opponents, this.opponents);
            // Overlaps for hits
            this.physics.add.overlap(this.balloons, this.player, this.hitPlayer, null, this);
            this.physics.add.overlap(this.balloons, this.opponents, this.hitOpponent, null, this);

            // Keyboard Controls
            this.cursors = this.input.keyboard.createCursorKeys();
            this.wasd = this.input.keyboard.addKeys('W,A,S,D');

            // Mobile Drag and Move Setup
            this.isDragging = false;
            this.player.setInteractive({ draggable: true });
            
            this.player.on('dragstart', (pointer) => {
                this.isDragging = true;
                this.player.setScale(1.1); // Visual feedback
            });

            this.player.on('drag', (pointer, dragX, dragY) => {
                // Keep player within bounds while dragging
                this.player.x = Phaser.Math.Clamp(dragX, 30, this.scale.width - 30);
                this.player.y = Phaser.Math.Clamp(dragY, 40, this.scale.height - 40);
                // Update physics body to match visual position
                this.player.body.reset(this.player.x, this.player.y);
            });

            this.player.on('dragend', (pointer) => {
                this.isDragging = false;
                this.player.setScale(1);
            });

            this.handlePointerDown = (p) => {
                if(this.isPaused || this.gameEnded) return;
                // Only throw if we aren't dragging the player
                if(!this.isDragging) {
                    this.throwBalloon(this.player, new Phaser.Math.Vector2(p.x, p.y));
                    this.bob(this.player);
                }
            };

            this.input.on('pointerdown', this.handlePointerDown, this);

            // Pause button (top right)
            const pauseBtn = this.add.text(760, 20, '⏸ PAUSE', { 
                font: '24px Comic Sans MS', fill: '#fff', backgroundColor: '#8800aa', padding: {x:10,y:5}, stroke: '#fff', strokeThickness: 2 
            }).setOrigin(1, 0).setDepth(100).setInteractive({ useHandCursor: true });
            
            pauseBtn.on('pointerdown', () => this.showPauseMenu());
            pauseBtn.on('pointerover', () => this.tweens.add({targets: pauseBtn, scale: 1.05, duration: 100}));
            pauseBtn.on('pointerout', () => this.tweens.add({targets: pauseBtn, scale: 1, duration: 100}));

            // HUD Elements
            const isBossLevel = this.levelConfig.isBoss;
            const levelLabel = isBossLevel ? '👑 BOSS!' : `Level ${this.currentLevel}/5`;
            this.levelText = this.add.text(this.scale.width/2, 20, levelLabel, {
                font: '28px Comic Sans MS', fill: isBossLevel ? '#ff88ff' : '#FFD700',
                stroke: '#000', strokeThickness: 4
            }).setOrigin(0.5, 0).setDepth(100);
            const soakTarget = isBossLevel ? '' : `0/${this.levelConfig.opponents}`;
            this.scoreText = this.add.text(20, 20, `Soaked: ${soakTarget}`, { font: '24px Comic Sans MS', fill: '#fff', stroke: '#000', strokeThickness: 4 }).setDepth(100);
            this.livesText = this.add.text(20, 50, '❤️❤️❤️❤️❤️', { font: '20px Comic Sans MS' }).setDepth(100);
            this.timeLeft = this.levelConfig.time;
            const timerLabelPos = this.scale.width - 20;
            this.timerText = this.add.text(timerLabelPos, 20, `Time: ${this.timeLeft}`, { font: '24px Comic Sans MS', fill: '#fff', stroke: '#000', strokeThickness: 4 }).setOrigin(1, 0).setDepth(100);

            // Update Pause Button Position
            pauseBtn.setPosition(this.scale.width - 20, 20); // Reuse pauseBtn if possible or reposition logic
            // Note: pauseBtn was created earlier, let's ensure it's positioned correctly
            pauseBtn.setX(this.scale.width - 20);
            this.timerText.setX(this.scale.width - 130); // Move timer slightly left of pause button

            // Game Timer
            this.time.addEvent({ delay: 1000, loop: true, callback: () => {
                if(!this.isPaused && !this.gameEnded) {
                    this.timeLeft--;
                    this.timerText.setText(`Time: ${this.timeLeft}`);
                    if(this.timeLeft <= 0) this.endGame(false);
                }
            }});
        }

        showPauseMenu() {
            this.isPaused = true;
            this.physics.pause();
            
            const W = this.scale.width;
            const H = this.scale.height;

            // Semi-transparent overlay
            let overlay = this.add.rectangle(W/2, H/2, W, H, 0x000000, 0.7).setDepth(2000);
            
            // Pause Text
            this.add.text(W/2, H/2 - 150, 'PAUSED', {font:'64px Comic Sans MS', fill:'#fff', stroke:'#000', strokeThickness:8}).setOrigin(0.5).setDepth(2001);
            
            // Resume Button
            let resumeBtn = this.add.text(W/2, H/2 - 20, ' RESUME ', {
                font:'40px Comic Sans MS', fill:'#fff', backgroundColor:'#00aa00', padding: {x:20,y:10}, stroke:'#fff', strokeThickness:4
            }).setOrigin(0.5).setDepth(2001).setInteractive({useHandCursor:true});
            
            resumeBtn.on('pointerdown', () => {
                overlay.destroy();
                resumeBtn.destroy();
                menuBtn.destroy();
                this.physics.resume();
                this.isPaused = false;
            });
            resumeBtn.on('pointerover', () => this.tweens.add({targets: resumeBtn, scale: 1.1, duration: 100}));
            resumeBtn.on('pointerout', () => this.tweens.add({targets: resumeBtn, scale: 1, duration: 100}));

            // Menu Button
            let menuBtn = this.add.text(W/2, H/2 + 80, ' MENU ', {
                font:'40px Comic Sans MS', fill:'#fff', backgroundColor:'#aa00ff', padding: {x:20,y:10}, stroke:'#fff', strokeThickness:4
            }).setOrigin(0.5).setDepth(2001).setInteractive({useHandCursor:true});
            
            menuBtn.on('pointerdown', () => {
                sfx.stopMusic();
                this.scene.start('MainMenu');
            });
            menuBtn.on('pointerover', () => this.tweens.add({targets: menuBtn, scale: 1.1, duration: 100}));
            menuBtn.on('pointerout', () => this.tweens.add({targets: menuBtn, scale: 1, duration: 100}));
        }

        // Calculates joystick vector direction
        updateJoy(p) {
            let d = Phaser.Math.Distance.Between(this.joyBase.x, this.joyBase.y, p.x, p.y);
            let a = Phaser.Math.Angle.Between(this.joyBase.x, this.joyBase.y, p.x, p.y);
            if(d > 80) d = 80;
            this.joyThumb.x = this.joyBase.x + Math.cos(a)*d;
            this.joyThumb.y = this.joyBase.y + Math.sin(a)*d;
            this.joyVector.set(Math.cos(a)*(d/80), Math.sin(a)*(d/80));
        }

        update() {
            if(this.isPaused || this.gameEnded) return;

            // Process Keyboard Movement (Joystick logic removed)
            let iv = new Phaser.Math.Vector2(0, 0);
            if(this.cursors.left.isDown || this.wasd.A.isDown) iv.x = -1;
            if(this.cursors.right.isDown || this.wasd.D.isDown) iv.x = 1;
            if(this.cursors.up.isDown || this.wasd.W.isDown) iv.y = -1;
            if(this.cursors.down.isDown || this.wasd.S.isDown) iv.y = 1;
            
            if(iv.lengthSq() > 1) iv.normalize();
            
            // Only apply keyboard velocity if not dragging
            if (!this.isDragging) {
                this.player.setVelocity(iv.x * 250, iv.y * 250);
            } else {
                this.player.setVelocity(0, 0);
            }

            // Animate Player Wobble or Rotation
            if(iv.lengthSq() > 0 || (this.isDragging && !this.player.body.speed === 0)) {
                this.player.angle = Math.sin(this.time.now / 100) * 10;
            } else {
                this.player.angle = 0;
            }

            // Pseudo-3D Depth Sorting
            this.player.setDepth(this.player.y);
            this.opponents.children.each(o => o.setDepth(o.y));
        }

        // Visual squash/stretch animation
        bob(sprite) {
            this.tweens.add({ targets: sprite, scaleY: 0.8, scaleX: 1.2, duration: 100, yoyo: true });
        }

        // Level configs: opponents, speed, throwChance (0-100), time (seconds)
        getLevelConfig(level) {
            const configs = [
                null,
                { opponents: 2, speed: 85,  throwChance: 18, time: 60, isBoss: false }, // Level 1
                { opponents: 3, speed: 105, throwChance: 28, time: 65, isBoss: false }, // Level 2
                { opponents: 4, speed: 130, throwChance: 38, time: 70, isBoss: false }, // Level 3
                { opponents: 5, speed: 155, throwChance: 50, time: 75, isBoss: false }, // Level 4
                { opponents: 6, speed: 175, throwChance: 62, time: 80, isBoss: false }, // Level 5
                { opponents: 0, speed: 0,   throwChance: 0,  time: 90, isBoss: true  }, // Level 6 - Boss
            ];
            return configs[Math.min(level, 6)] || configs[1];
        }

        spawnLevel() {
            const cfg = this.levelConfig;
            if (cfg.isBoss) {
                this.boss = this.physics.add.sprite(400, 130, 'boss').setCollideWorldBounds(true).setBounce(0.5).setDepth(12);
                this.boss.setScale(1.3);
                this.boss.body.setSize(60, 75).setOffset(20, 35);
                this.boss.setData('soaked', false);
                this.boss.setData('isBoss', true);
                this.boss.setData('hp', 10);
                this.opponents.add(this.boss);
                this.moveBoss(this.boss);
                // Boss HP bar
                this.bossHpBg  = this.add.rectangle(400, 578, 304, 22, 0x330033).setDepth(100).setOrigin(0.5);
                this.bossHpBar = this.add.rectangle(250, 578, 300, 18, 0xff00ff).setDepth(101).setOrigin(0, 0.5);
                this.bossLabel = this.add.text(400, 556, '👑 FINAL BOSS', { font: '16px Comic Sans MS', fill: '#ff88ff', stroke: '#000', strokeThickness: 3 }).setOrigin(0.5).setDepth(101);
            } else {
                for (let i = 0; i < cfg.opponents; i++) {
                    let op = this.physics.add.sprite(
                        Phaser.Math.Between(80, 720),
                        Phaser.Math.Between(80, 220),
                        'opponent'
                    ).setCollideWorldBounds(true).setBounce(1).setDepth(10);
                    op.body.setSize(40, 40).setOffset(10, 22);
                    op.setData('soaked', false);
                    op.setData('isBoss', false);
                    op.setData('speed', cfg.speed);
                    op.setData('throwChance', cfg.throwChance);
                    this.opponents.add(op);
                    this.moveOpponent(op);
                }
            }
        }

        showLevelComplete() {
            const W = this.scale.width;
            const H = this.scale.height;
            sfx.cheer();

            this.add.rectangle(W/2, H/2, W, H, 0x000000, 0.65).setDepth(3000);

            const banner = this.add.text(W/2, H/2 - 60, `LEVEL ${this.currentLevel}\nCOMPLETE!`, {
                fontFamily: 'Comic Sans MS', fontSize: '64px',
                color: '#FFD700', stroke: '#000', strokeThickness: 8, align: 'center'
            }).setOrigin(0.5).setDepth(3001).setAlpha(0).setScale(0.4);
            this.tweens.add({ targets: banner, alpha: 1, scaleX: 1, scaleY: 1, duration: 500, ease: 'Back.easeOut' });

            const nextLevel = this.currentLevel + 1;
            const nextMsg = nextLevel === 6 ? '👑  Next: FINAL BOSS!' : `Next: Level ${nextLevel}/5`;
            const sub = this.add.text(W/2, H/2 + 55, nextMsg, {
                fontFamily: 'Comic Sans MS', fontSize: '30px',
                color: nextLevel === 6 ? '#ff88ff' : '#ffffff',
                stroke: '#000', strokeThickness: 4
            }).setOrigin(0.5).setAlpha(0).setDepth(3001);
            this.tweens.add({ targets: sub, alpha: 1, duration: 400, delay: 600 });

            this.time.delayedCall(3200, () => {
                this.cameras.main.fadeOut(600, 0, 0, 0);
                this.cameras.main.once('camerafadeoutcomplete', () => {
                    this.scene.restart({ level: nextLevel });
                });
            });
        }

        // Regular Opponent AI
        moveOpponent(op) {
            if (!op || op.getData('soaked') || !op.active || op.getData('isBoss')) return;
            const speed = op.getData('speed') || 100;
            const throwChance = op.getData('throwChance') || 30;
            this.physics.velocityFromRotation(Phaser.Math.FloatBetween(0, Math.PI * 2), speed, op.body.velocity);
            if (Phaser.Math.Between(0, 100) < throwChance) {
                this.time.delayedCall(Phaser.Math.Between(400, 1400), () => {
                    if (!op.getData('soaked') && op.active && !this.gameEnded) {
                        this.throwBalloon(op, new Phaser.Math.Vector2(this.player.x, this.player.y), true);
                        this.bob(op);
                    }
                });
            }
            this.time.delayedCall(Phaser.Math.Between(900, 2200), () => this.moveOpponent(op));
        }

        // Final Boss AI - faster, throws TWO balloons per attack with spread
        moveBoss(op) {
            if (!op || !op.active || this.gameEnded) return;
            this.physics.velocityFromRotation(Phaser.Math.FloatBetween(0, Math.PI * 2), 190, op.body.velocity);
            this.time.delayedCall(Phaser.Math.Between(300, 800), () => {
                if (!op.active || this.gameEnded) return;
                const angle = Phaser.Math.Angle.Between(op.x, op.y, this.player.x, this.player.y);
                const spread = 0.2;
                this.throwBalloonAtAngle(op, angle - spread);
                this.time.delayedCall(130, () => {
                    if (op.active && !this.gameEnded) this.throwBalloonAtAngle(op, angle + spread);
                });
                this.bob(op);
            });
            this.time.delayedCall(Phaser.Math.Between(900, 1800), () => this.moveBoss(op));
        }

        throwBalloonAtAngle(thrower, angle) {
            const balloon = this.balloons.get(thrower.x, thrower.y, 'balloon');
            if (balloon) {
                balloon.setActive(true).setVisible(true);
                balloon.setVelocity(Math.cos(angle) * 320, Math.sin(angle) * 320);
                balloon.setData('owner', thrower);
                balloon.setData('isOpponentBalloon', true);
            }
        }

        throwBalloon(thrower, target, isOpponent) {
            if (!thrower || thrower.getData('soaked')) return;
            if (thrower.x < 0 || thrower.x > this.scale.width || thrower.y < 0 || thrower.y > this.scale.height) return;
            const balloon = this.balloons.get(thrower.x, thrower.y, 'balloon');
            if (balloon) {
                balloon.setActive(true).setVisible(true);
                this.physics.moveTo(balloon, target.x, target.y, 300);
                balloon.setData('owner', thrower);
                balloon.setData('isOpponentBalloon', isOpponent || false);
            }
        }

        splash(x, y) {
            sfx.splash();
            let e = this.add.particles(x, y, 'splash_part', {
                speed: {min:50, max:200}, angle: {min:0, max:360},
                scale: {start:1, end:0}, lifespan: 400, quantity: 15, gravityY: 300
            }).setDepth(y+20);
            this.time.delayedCall(400, () => e.destroy());
        }

        hitPlayer(player, balloon) {
            if (this.gameEnded) return;
            if (!balloon.getData('isOpponentBalloon')) return; // Only opponent balloons hurt player
            if (!player.invulnerable) {
                balloon.setActive(false).setVisible(false);
                this.splash(player.x, player.y);
                player.invulnerable = true;
                this.cameras.main.shake(200, 0.015);
                this.tweens.add({
                    targets: player, alpha: 0.5, yoyo: true, repeat: 5, duration: 100,
                    onComplete: () => { player.invulnerable = false; }
                });
                this.playerSoakedCount++;
                const livesLeft = Math.max(0, 5 - this.playerSoakedCount);
                this.livesText.setText(livesLeft > 0 ? '❤️'.repeat(livesLeft) : '💀');
                if (this.playerSoakedCount >= 5) this.endGame(false);
            }
        }

        hitOpponent(balloon, op) {
            if (this.gameEnded) return;
            if (!op || !op.active) return;
            if (balloon.getData('isOpponentBalloon')) return; // Opponent balloons don't hurt opponents
            if (op.getData('soaked')) return;

            balloon.setActive(false).setVisible(false);
            this.splash(op.x, op.y);
            sfx.giggle();

            if (op.getData('isBoss')) {
                const hp = op.getData('hp') - 1;
                op.setData('hp', hp);
                // Flash boss on hit
                this.tweens.add({ targets: op, alpha: 0.2, duration: 70, yoyo: true, repeat: 2,
                    onComplete: () => op.setAlpha(1) });
                // Update HP bar width and color
                const pct = Math.max(0, hp / 10);
                this.tweens.add({ targets: this.bossHpBar, displayWidth: Math.ceil(300 * pct), duration: 200 });
                if (pct <= 0.3) this.bossHpBar.setFillStyle(0xff3300);
                else if (pct <= 0.6) this.bossHpBar.setFillStyle(0xffaa00);
                if (hp <= 0) {
                    op.setActive(false).setVisible(false);
                    op.body.stop();
                    this.bossHpBar.destroy();
                    this.bossHpBg.destroy();
                    this.bossLabel.destroy();
                    this.endGame(true);
                }
                return;
            }

            // Regular opponent - permanently soaked
            this.npcSoakedCount++;
            this.scoreText.setText(`Soaked: ${this.npcSoakedCount}/${this.levelConfig.opponents}`);
            op.setData('soaked', true);
            op.setVelocity(0, 0);
            op.body.stop();
            op.setTint(0x00aaff);
            op.setAlpha(0.5);
            // Check if all opponents soaked = level clear
            if (this.npcSoakedCount >= this.levelConfig.opponents) {
                this.endGame(true);
            }
        }

        endGame(playerWon) {
            if (this.gameEnded) return;
            this.gameEnded = true;
            this.isPaused = true;
            this.physics.pause();
            if (playerWon) {
                if (this.levelConfig.isBoss) {
                    // Defeated the final boss — true victory!
                    dataManager.addStars(10);
                    this.time.delayedCall(400, () => {
                        this.scene.pause();
                        this.scene.launch('WinScreen');
                    });
                } else {
                    // Level 1-5 cleared — advance
                    dataManager.addStars(this.currentLevel);
                    this.showLevelComplete();
                }
            } else {
                this.time.delayedCall(400, () => {
                    this.scene.pause();
                    this.scene.launch('LoseScreen');
                });
            }
        }

        // Cleanup handlers when scene shuts down
        shutdown() {
            if (this.handlePointerDown) this.input.off('pointerdown', this.handlePointerDown, this);
        }
    }

                targets: winText,
                alpha: 1,
                scaleX: 1,
                scaleY: 1,
                duration: 600,
                ease: 'Back.easeOut'
            });

            // Pulsing rainbow color cycle on the text
            const textColors = ['#FFD700', '#ff4488', '#00ffcc', '#ff8800', '#aaffff', '#ff44ff'];
            let colorIdx = 0;
            this.time.addEvent({
                delay: 300,
                repeat: 20,
                callback: () => {
                    colorIdx = (colorIdx + 1) % textColors.length;
                    winText.setColor(textColors[colorIdx]);
                }
            });

            // Bounce animation
            this.tweens.add({
                targets: winText,
                y: H / 2 - 35,
                duration: 700,
                yoyo: true,
                repeat: -1,
                ease: 'Sine.easeInOut',
                delay: 600
            });

            // --- SCATTERED BALLOONS floating up ---
            for (let i = 0; i < 24; i++) {
                const x = Phaser.Math.Between(30, W - 30);
                const startY = Phaser.Math.Between(H * 0.5, H + 60);
                const color = Phaser.Utils.Array.GetRandom(balloonColors);
                const size = Phaser.Math.Between(16, 38);
                const delay = i * 180;

                const gfx = this.add.graphics().setDepth(80);
                gfx.fillStyle(color, 1);
                gfx.fillCircle(0, 0, size);
                gfx.fillStyle(0xffffff, 0.3);
                gfx.fillCircle(-size * 0.3, -size * 0.35, size * 0.35);
                gfx.lineStyle(1.5, 0x888888, 0.7);
                gfx.lineBetween(0, size, Phaser.Math.Between(-8, 8), size + 22);
                gfx.setPosition(x, startY);

                this.tweens.add({
                    targets: gfx,
                    y: startY - Phaser.Math.Between(300, H + 80),
                    x: x + Phaser.Math.Between(-60, 60),
                    alpha: { from: 0, to: 1 },
                    duration: Phaser.Math.Between(3500, 6500),
                    delay: delay,
                    ease: 'Sine.easeInOut',
                    onComplete: () => gfx.destroy()
                });

                // Gentle sway
                this.tweens.add({
                    targets: gfx,
                    angle: Phaser.Math.Between(-15, 15),
                    duration: Phaser.Math.Between(600, 1200),
                    yoyo: true,
                    repeat: -1,
                    ease: 'Sine.easeInOut',
                    delay: delay
                });
            }

            // Stars / sparkles
            for (let i = 0; i < 30; i++) {
                const star = this.add.text(
                    Phaser.Math.Between(20, W - 20),
                    Phaser.Math.Between(20, H - 20),
                    Phaser.Utils.Array.GetRandom(['⭐', '✨', '💧', '🎉', '🌈']),
                    { fontSize: `${Phaser.Math.Between(18, 40)}px` }
                ).setAlpha(0).setDepth(90);

                this.tweens.add({
                    targets: star,
                    alpha: 1,
                    duration: 400,
                    delay: Phaser.Math.Between(200, 2500),
                    yoyo: true,
                    repeat: 3,
                    onComplete: () => star.destroy()
                });
            }

            // --- FADE OUT + BACK TO MENU after 7 seconds ---
            this.time.delayedCall(7000, () => {
                this.cameras.main.fadeOut(1500, 0, 0, 0);
                this.cameras.main.once('camerafadeoutcomplete', () => {
                    this.scene.stop('Game');
                    this.scene.start('MainMenu');
                });
            });
        }
    }

    function getGameSize() {
        // Mobile first: full viewport
        let w = window.innerWidth;
        let h = window.innerHeight;
        // Tablet
        if (w >= 600 && w < 1024) {
            w = Math.min(w, 900);
            h = Math.min(h, 700);
        }
        // Desktop
        if (w >= 1024) {
            w = 800;
            h = 600;
        }
        return { width: w, height: h };
    }

    const size = getGameSize();
    const config = {
        type: Phaser.AUTO,
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
            width: size.width,
            height: size.height,
            parent: 'game-container',
        },
        physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
        scene: [Preloader, MainMenu, Options, Game, LoseScreen, WinScreen],
    };

    // Boot the game
    const game = new Phaser.Game(config);

    window.addEventListener('resize', () => {
        const newSize = getGameSize();
        game.scale.resize(newSize.width, newSize.height);
    });
</script>
</body>
</html>
